<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te amo zorrito</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

        .love-btn {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 20px;
            background: #ff6f91;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .love-btn:hover {
            background: #ff3d6d;
            transform: scale(1.05);
        }

        body {
            margin: 0;
            height: 100vh;

            background:
                radial-gradient(circle at center, rgba(208, 136, 212, 0.7), rgba(84, 1, 65, 0.9)),
                url("fotos/fondo.jpg");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* CONTENEDOR */
        .container {
            position: relative;
            text-align: center;
            z-index: 2;
        }

        /* TEXTO */
        .text {
            font-family: 'Pacifico', cursive;
            font-size: 3em;
            color: #e8602eb3;
            text-shadow: 2px 2px 5px rgba(248, 248, 248, 0.911);
        }

        /* CARITA DE ZORRO */
        .fox-face {
            font-size: 120px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        /* CORAZÓN */
        .heart {
            font-size: 60px;
            display: block;
            margin-top: -10px;
            animation: beat 1s infinite;
        }

        /* FLOR DETRÁS */
        .flower-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ffb6c1 40%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            box-shadow: 0 0 50px rgba(255, 182, 193, 0.6);
        }

        /* FLORES QUE CAEN */
        .flower {
            position: absolute;
            top: -50px;
            font-size: 24px;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Animaciones */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes beat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="flower-bg"></div>
        <div class="fox-face">🦊</div>
        <div class="heart">💖</div>
        <div class="text">Te amo zorrito</div>
        <button class="love-btn" onclick="irCarta()">
            Eres lo más bello que he visto ¿Sabes por que? 💖
        </button>
    </div>

    <audio id="sound1" src="audios/sparkle1.mp3" preload="auto"></audio>
    <audio id="sound2" src="audios/sparkle2.mp3" preload="auto"></audio>

    <script>
        const flowers = ["🌸", "🌺", "🌼", "💮", "🌻"];

        function createFlower() {
            const f = document.createElement("div");
            f.className = "flower";
            f.textContent = flowers[Math.floor(Math.random() * flowers.length)];

            f.style.left = Math.random() * 100 + "vw";

            const size = Math.random() * 20 + 20;
            f.style.fontSize = size + "px";

            const duration = Math.random() * 3 + 4;
            f.style.animationDuration = duration + "s";

            document.body.appendChild(f);

            setTimeout(() => f.remove(), duration * 1000);
        }

        // Animación optimizada
        let lastTime = 0;

        function loop(time) {
            if (time - lastTime > 250) {
                createFlower();
                lastTime = time;
            }
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
        const sound1 = document.getElementById("sound1");
        const sound2 = document.getElementById("sound2");

        const sounds = [sound1, sound2];
        document.body.addEventListener("click", () => {
            // sonido aleatorio
            const s = sounds[Math.floor(Math.random() * sounds.length)];
            s.currentTime = 0;
            s.volume = 0.4;
            s.play();
            // flores
            for (let i = 0; i < 12; i++) createFlower();
        });

        function irCarta() {
            window.location.href = "carta.html";
        }
    </script>

</body>

</html>
